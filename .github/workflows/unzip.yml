name: Unzip File to Root

on:
  push:
    paths:
      - 'renewhelper-main.zip'
  workflow_dispatch:

# --- 关键修改：添加以下权限配置 ---
permissions:
  contents: write
# ------------------------------

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip the file
        run: |
          unzip renewhelper-main.zip -d ./temp_unzip
          # 尝试兼容不同的压缩包层级结构
          if [ -d "./temp_unzip/renewhelper-main" ]; then
            mv ./temp_unzip/renewhelper-main/* .
          else
            mv ./temp_unzip/* .
          fi
          rm -rf temp_unzip
          rm renewhelper-main.zip

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # 检查是否有文件变更，防止没有变更时 commit 报错
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-unzip: extracted files to root" && git push)
